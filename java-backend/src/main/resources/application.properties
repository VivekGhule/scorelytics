# Server Configuration
server.port=${SERVER_PORT:8080}

# MongoDB Atlas Configuration
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/scorelytics}
spring.data.mongodb.auto-index-creation=true

# JWT Configuration
jwt.secret=${JWT_SECRET:scorelytics-dev-secret-change-me-please-scorelytics-dev-secret-change-me-please}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Logging Configuration
logging.level.com.scorelytics=${LOG_LEVEL:DEBUG}
logging.level.org.springframework.boot=INFO
logging.level.org.springframework.security=INFO

# Spring Boot Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Study Resources / GridFS
app.gridfs.bucket=${GRIDFS_BUCKET:studyResourcesFiles}
spring.servlet.multipart.max-file-size=${STUDY_RESOURCE_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${STUDY_RESOURCE_MAX_REQUEST_SIZE:10MB}
